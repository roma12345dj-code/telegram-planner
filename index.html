<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Мой планнер</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      margin: 0;
      font-weight: 800;
    }

    .date {
      color: #8b8b8b;
      font-size: 15px;
      margin-top: 6px;
      margin-bottom: 28px;
    }

    .card {
      border: 1px solid #eeeeee;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
      background: #ffffff;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f1f1f1;
      font-size: 16px;
    }

    .task:last-child {
      border-bottom: none;
    }

    .circle {
      width: 20px;
      height: 20px;
      border: 1.5px solid #cfcfcf;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .done {
      color: #b5b5b5;
      text-decoration: line-through;
    }

    .button {
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: #5d6dfe;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .note {
      color: #666666;
      line-height: 1.5;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Сегодня</h1>
    <div class="date">Мой Telegram-планнер</div>

    <div class="card">
      <div class="card-title">Задачи</div>

      <div class="task">
        <div class="circle"></div>
        <div>Создать первую задачу</div>
      </div>

      <div class="task">
        <div class="circle"></div>
        <div>Проверить календарь</div>
      </div>

      <div class="task">
        <div class="circle"></div>
        <div class="done">Придумать идею приложения</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Заметка</div>
      <div class="note">
        Здесь будет приложение для задач, заметок, календаря и напоминаний.
      </div>
    </div>

    <button class="button" onclick="alert('Mini App работает')">
      Добавить задачу
    </button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();
  </script>
</body>
</html>
